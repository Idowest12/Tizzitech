<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Dark gradient background for standalone viewing, but we'll make the background transparent for use in the app -->
    <linearGradient id="t-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="40%" stop-color="#3B82F6" />
      <stop offset="60%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(100, 40)">
    <!-- Main T shape -->
    <!-- Top left bar -->
    <path d="M 0,40 L 40,0 L 100,0 L 120,20 L 30,20 Z" fill="url(#t-gradient)" />
    
    <!-- Vertical stem left side -->
    <path d="M 60,140 L 30,20 L 70,20 L 100,140 Z" fill="url(#t-gradient)" />
    
    <!-- Vertical stem right side / hook -->
    <path d="M 70,140 L 100,20 L 140,70 L 130,110 Z" fill="url(#t-gradient)" />

    <!-- Cyan inner accent -->
    <path d="M 50,135 L 75,35 L 125,95 L 90,135 Z" fill="#06B6D4" opacity="0.6" filter="url(#glow)"/>
    <path d="M 55,130 L 78,40 L 118,90 L 92,130 Z" fill="#0A0A0A" />

    <!-- Circuit lines extending right -->
    <path d="M 100,0 L 150,0 L 170,20 L 220,20" fill="none" stroke="url(#t-gradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="220" cy="20" r="5" fill="#06B6D4" filter="url(#glow)"/>

    <path d="M 110,10 L 140,10 L 160,30 L 200,30" fill="none" stroke="url(#t-gradient)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="200" cy="30" r="4.5" fill="#06B6D4" filter="url(#glow)"/>

    <path d="M 120,20 L 140,40 L 180,40" fill="none" stroke="url(#t-gradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="180" cy="40" r="4" fill="#06B6D4" filter="url(#glow)"/>

    <!-- Left accent purple line -->
    <path d="M 45,130 L 20,40" fill="none" stroke="url(#accent-gradient)" stroke-width="4" stroke-linecap="round" />
    
    <!-- Inner cyan accent line -->
    <path d="M 75,45 L 90,110" fill="none" stroke="#06B6D4" stroke-width="3" filter="url(#glow)" />
    <circle cx="90" cy="110" r="3" fill="#06B6D4" />
  </g>

  <!-- Typography -->
  <text x="200" y="240" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="900" font-size="42" fill="url(#t-gradient)" text-anchor="middle" letter-spacing="4">TIZZITECH</text>
</svg>
